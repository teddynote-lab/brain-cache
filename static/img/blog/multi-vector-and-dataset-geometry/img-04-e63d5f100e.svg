<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 440" width="980" height="440" font-family="Georgia, 'Times New Roman', serif">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0c1018"/><stop offset="100%" stop-color="#111620"/>
        </linearGradient>
        <!-- Stage panel gradients -->
        <linearGradient id="stageA" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1a1228"/><stop offset="100%" stop-color="#120d1e"/>
        </linearGradient>
        <linearGradient id="stageB" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0f1e30"/><stop offset="100%" stop-color="#09162a"/>
        </linearGradient>
        <linearGradient id="stageC" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0e2018"/><stop offset="100%" stop-color="#091610"/>
        </linearGradient>
        <linearGradient id="stageD" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1a1a0a"/><stop offset="100%" stop-color="#12120a"/>
        </linearGradient>
        <!-- Arrow markers -->
        <marker id="arrW" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
            <path d="M0,0 L0,7 L9,3.5 z" fill="#94a3b8"/>
        </marker>
        <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
            <path d="M0,0 L0,7 L9,3.5 z" fill="#4ade80"/>
        </marker>
        <marker id="arrY" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
            <path d="M0,0 L0,7 L9,3.5 z" fill="#facc15"/>
        </marker>
        <!-- Glow -->
        <filter id="g1">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="g2">
            <feGaussianBlur stdDeviation="2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- HNSW cylinder gradient -->
        <linearGradient id="cylTop" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4ade80" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#16a34a" stop-opacity="0.9"/>
        </linearGradient>
        <radialGradient id="cylEllipse" cx="50%" cy="40%" r="50%">
            <stop offset="0%" stop-color="#6ee7b7"/>
            <stop offset="100%" stop-color="#059669"/>
        </radialGradient>
        <!-- Query/Doc dot gradients -->
        <radialGradient id="qDot" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#7e22ce"/>
        </radialGradient>
        <radialGradient id="dDot" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#60a5fa"/>
            <stop offset="100%" stop-color="#1d4ed8"/>
        </radialGradient>
        <radialGradient id="meanQ" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#e879f9"/>
            <stop offset="100%" stop-color="#7e22ce"/>
        </radialGradient>
        <radialGradient id="meanD" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0369a1"/>
        </radialGradient>
    </defs>

    <rect width="980" height="440" fill="url(#bg)"/>

    <!-- Title -->
    <text x="490" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#e2e8f0" letter-spacing="0.4">Hack #1: SumSim Reduces Exactly to Mean-Pooled MIPS</text>
    <text x="490" y="54" text-anchor="middle" font-size="11.5" fill="#64748b" font-style="italic">SumSim(Q, P) = Σᵢ Σⱼ ⟨qᵢ, pⱼ⟩ — bilinearity collapses all |Q|×|P| pairs into a single dot product</text>

    <!-- ═══ STAGE 1: Multi-vector sets ═══ -->
    <rect x="18" y="68" width="198" height="315" rx="9" fill="url(#stageA)" stroke="#3b1a5a" stroke-width="1"/>
    <rect x="18" y="68" width="198" height="34" rx="9" fill="#251545" opacity="0.95"/>
    <rect x="18" y="88" width="198" height="14" fill="#251545" opacity="0.95"/>
    <text x="117" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#d8b4fe" letter-spacing="0.2">Step 1: Multi-Vector Sets</text>
    <text x="117" y="102" text-anchor="middle" font-size="10" fill="#a78bfa" font-style="italic">|Q|×|P| pairwise interactions</text>

    <!-- Query tokens Q -->
    <text x="65" y="130" text-anchor="middle" font-size="11" fill="#c084fc" font-weight="bold">Q = {q₁…qₘ}</text>
    <!-- 4 query dots -->
    <circle cx="45" cy="155" r="8" fill="url(#qDot)" filter="url(#g2)"/>
    <text x="45" y="159" text-anchor="middle" font-size="8" fill="white">q₁</text>
    <circle cx="70" cy="155" r="8" fill="url(#qDot)" filter="url(#g2)"/>
    <text x="70" y="159" text-anchor="middle" font-size="8" fill="white">q₂</text>
    <circle cx="95" cy="155" r="8" fill="url(#qDot)" filter="url(#g2)"/>
    <text x="95" y="159" text-anchor="middle" font-size="8" fill="white">q₃</text>
    <circle cx="44" cy="183" r="7" fill="#4a1472" opacity="0.7"/>
    <text x="44" y="187" text-anchor="middle" font-size="8" fill="#c084fc">q₄</text>
    <circle cx="70" cy="183" r="7" fill="#4a1472" opacity="0.7"/>
    <text x="70" y="187" text-anchor="middle" font-size="8" fill="#c084fc">q₅</text>

    <!-- Doc tokens P -->
    <text x="155" y="130" text-anchor="middle" font-size="11" fill="#60a5fa" font-weight="bold">P = {p₁…pₙ}</text>
    <circle cx="135" cy="155" r="8" fill="url(#dDot)" filter="url(#g2)"/>
    <text x="135" y="159" text-anchor="middle" font-size="8" fill="white">p₁</text>
    <circle cx="160" cy="155" r="8" fill="url(#dDot)" filter="url(#g2)"/>
    <text x="160" y="159" text-anchor="middle" font-size="8" fill="white">p₂</text>
    <circle cx="185" cy="155" r="8" fill="url(#dDot)" filter="url(#g2)"/>
    <text x="185" y="159" text-anchor="middle" font-size="8" fill="white">p₃</text>
    <circle cx="135" cy="183" r="7" fill="#1e3a72" opacity="0.7"/>
    <text x="135" y="187" text-anchor="middle" font-size="8" fill="#60a5fa">p₄</text>
    <circle cx="160" cy="183" r="7" fill="#1e3a72" opacity="0.7"/>
    <text x="160" y="187" text-anchor="middle" font-size="8" fill="#60a5fa">p₅</text>

    <!-- Dense all-pairs connection grid -->
    <g stroke="#6d28d9" stroke-width="0.6" opacity="0.3">
        <!-- q1 to all p -->
        <line x1="53" y1="155" x2="127" y2="155"/>
        <line x1="53" y1="155" x2="152" y2="155"/>
        <line x1="53" y1="155" x2="177" y2="155"/>
        <line x1="53" y1="155" x2="128" y2="183"/>
        <line x1="53" y1="155" x2="153" y2="183"/>
        <!-- q2 to all p -->
        <line x1="78" y1="155" x2="127" y2="155"/>
        <line x1="78" y1="155" x2="152" y2="155"/>
        <line x1="78" y1="155" x2="177" y2="155"/>
        <line x1="78" y1="155" x2="128" y2="183"/>
        <line x1="78" y1="155" x2="153" y2="183"/>
        <!-- q3 to all p -->
        <line x1="103" y1="155" x2="127" y2="155"/>
        <line x1="103" y1="155" x2="152" y2="155"/>
        <line x1="103" y1="155" x2="177" y2="155"/>
        <!-- q4-5 to p4-5 -->
        <line x1="52" y1="183" x2="128" y2="183"/>
        <line x1="52" y1="183" x2="153" y2="183"/>
        <line x1="78" y1="183" x2="128" y2="183"/>
        <line x1="78" y1="183" x2="153" y2="183"/>
    </g>

    <!-- "all-pairs" annotation -->
    <rect x="28" y="200" width="178" height="22" rx="4" fill="#1a0a28" stroke="#4a1472" stroke-width="0.8"/>
    <text x="117" y="215" text-anchor="middle" font-size="9.5" fill="#c084fc">|Q| × |P| dot products</text>

    <!-- Formula -->
    <text x="117" y="252" text-anchor="middle" font-size="11" fill="#e2e8f0">Σᵢ Σⱼ ⟨qᵢ, pⱼ⟩</text>
    <text x="117" y="270" text-anchor="middle" font-size="10" fill="#94a3b8">m × n operations</text>

    <!-- Cost callout -->
    <rect x="28" y="296" width="178" height="40" rx="5" fill="#0f041e" stroke="#6d28d9" stroke-width="1"/>
    <text x="117" y="311" text-anchor="middle" font-size="9.5" fill="#a78bfa">Naive cost: O(|Q|·|P|·D)</text>
    <text x="117" y="326" text-anchor="middle" font-size="9.5" fill="#f87171" font-weight="bold">Requires PLAID/MUVERA?</text>

    <!-- Arrow Stage 1 → 2 -->
    <line x1="218" y1="230" x2="250" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrW)"/>
    <text x="234" y="222" text-anchor="middle" font-size="9" fill="#64748b">bilinear</text>
    <text x="234" y="243" text-anchor="middle" font-size="9" fill="#64748b">identity</text>

    <!-- ═══ STAGE 2: Sum of sets ═══ -->
    <rect x="254" y="68" width="198" height="315" rx="9" fill="url(#stageB)" stroke="#1e3a5a" stroke-width="1"/>
    <rect x="254" y="68" width="198" height="34" rx="9" fill="#0e2036" opacity="0.95"/>
    <rect x="254" y="88" width="198" height="14" fill="#0e2036" opacity="0.95"/>
    <text x="353" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#7dd3fc" letter-spacing="0.2">Step 2: Sum Vectors</text>
    <text x="353" y="102" text-anchor="middle" font-size="10" fill="#38bdf8" font-style="italic">⟨ Σqᵢ, Σpⱼ ⟩</text>

    <!-- Σq vector — purple arrow from origin -->
    <text x="293" y="135" text-anchor="middle" font-size="11" fill="#c084fc" font-weight="bold">Σqᵢ</text>
    <!-- Stacked query arrows suggesting summation -->
    <line x1="278" y1="200" x2="278" y2="158" stroke="#c084fc" stroke-width="1.5" opacity="0.5" stroke-dasharray="3 2"/>
    <line x1="286" y1="200" x2="290" y2="155" stroke="#c084fc" stroke-width="1.5" opacity="0.5" stroke-dasharray="3 2"/>
    <line x1="295" y1="200" x2="303" y2="157" stroke="#c084fc" stroke-width="1.5" opacity="0.5" stroke-dasharray="3 2"/>
    <!-- Resulting sum vector -->
    <circle cx="290" cy="200" r="5" fill="#3b1472" stroke="#c084fc" stroke-width="1.5"/>
    <line x1="290" y1="200" x2="290" y2="160" stroke="#c084fc" stroke-width="2.5" marker-end="url(#arrW)" opacity="0.9"/>
    <circle cx="278" cy="155" r="3" fill="#c084fc" opacity="0.6"/>
    <circle cx="290" cy="153" r="3" fill="#c084fc" opacity="0.7"/>
    <circle cx="303" cy="156" r="3" fill="#c084fc" opacity="0.6"/>
    <text x="268" y="145" font-size="10" fill="#c084fc">→ sum</text>

    <!-- Σp vector — blue arrow -->
    <text x="415" y="135" text-anchor="middle" font-size="11" fill="#60a5fa" font-weight="bold">Σpⱼ</text>
    <line x1="398" y1="200" x2="402" y2="158" stroke="#60a5fa" stroke-width="1.5" opacity="0.5" stroke-dasharray="3 2"/>
    <line x1="408" y1="200" x2="415" y2="155" stroke="#60a5fa" stroke-width="1.5" opacity="0.5" stroke-dasharray="3 2"/>
    <line x1="418" y1="200" x2="428" y2="158" stroke="#60a5fa" stroke-width="1.5" opacity="0.5" stroke-dasharray="3 2"/>
    <circle cx="408" cy="200" r="5" fill="#0e2070" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="408" y1="200" x2="415" y2="160" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrW)" opacity="0.9"/>
    <circle cx="402" cy="157" r="3" fill="#60a5fa" opacity="0.6"/>
    <circle cx="415" cy="154" r="3" fill="#60a5fa" opacity="0.7"/>
    <circle cx="428" cy="157" r="3" fill="#60a5fa" opacity="0.6"/>
    <text x="385" y="145" font-size="10" fill="#60a5fa">→ sum</text>

    <!-- Single dot product annotation -->
    <text x="353" y="242" text-anchor="middle" font-size="12" fill="#e2e8f0">⟨ Σqᵢ , Σpⱼ ⟩</text>
    <text x="353" y="260" text-anchor="middle" font-size="10" fill="#94a3b8">one dot product</text>

    <!-- Formula block -->
    <rect x="265" y="275" width="175" height="44" rx="5" fill="#081424" stroke="#1e3a5a" stroke-width="1"/>
    <text x="353" y="292" text-anchor="middle" font-size="10" fill="#7dd3fc">= |Q|·|P|·⟨ q̄, p̄ ⟩</text>
    <text x="353" y="308" text-anchor="middle" font-size="10" fill="#94a3b8">factor out set sizes</text>

    <!-- Arrow Stage 2 → 3 -->
    <line x1="454" y1="230" x2="486" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrW)"/>
    <text x="470" y="222" text-anchor="middle" font-size="9" fill="#64748b">|Q|, |P|</text>
    <text x="470" y="243" text-anchor="middle" font-size="9" fill="#64748b">constant</text>

    <!-- ═══ STAGE 3: Mean-pooled vectors ═══ -->
    <rect x="490" y="68" width="198" height="315" rx="9" fill="url(#stageC)" stroke="#144028" stroke-width="1"/>
    <rect x="490" y="68" width="198" height="34" rx="9" fill="#092218" opacity="0.95"/>
    <rect x="490" y="88" width="198" height="14" fill="#092218" opacity="0.95"/>
    <text x="589" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#86efac" letter-spacing="0.2">Step 3: Mean Pooling</text>
    <text x="589" y="102" text-anchor="middle" font-size="10" fill="#4ade80" font-style="italic">∝ ⟨ q̄, p̄ ⟩</text>

    <!-- Mean-pooled query q̄ — single glowing vector -->
    <text x="537" y="133" text-anchor="middle" font-size="13" fill="#e879f9" font-weight="bold">q̄</text>
    <circle cx="537" cy="210" r="12" fill="#1a0a28" stroke="#e879f9" stroke-width="2.2" filter="url(#g1)"/>
    <circle cx="537" cy="210" r="5.5" fill="url(#meanQ)"/>
    <text x="537" y="238" text-anchor="middle" font-size="9.5" fill="#e879f9">mean(Q)</text>
    <text x="537" y="251" text-anchor="middle" font-size="9" fill="#94a3b8">1/|Q| Σqᵢ</text>

    <!-- Mean-pooled doc p̄ -->
    <text x="643" y="133" text-anchor="middle" font-size="13" fill="#38bdf8" font-weight="bold">p̄</text>
    <circle cx="643" cy="210" r="12" fill="#041824" stroke="#38bdf8" stroke-width="2.2" filter="url(#g1)"/>
    <circle cx="643" cy="210" r="5.5" fill="url(#meanD)"/>
    <text x="643" y="238" text-anchor="middle" font-size="9.5" fill="#38bdf8">mean(P)</text>
    <text x="643" y="251" text-anchor="middle" font-size="9" fill="#94a3b8">1/|P| Σpⱼ</text>

    <!-- Dot product line between q̄ and p̄ -->
    <line x1="549" y1="210" x2="631" y2="210" stroke="#facc15" stroke-width="2" stroke-dasharray="5 3" opacity="0.85"/>
    <text x="590" y="204" text-anchor="middle" font-size="10" fill="#facc15" font-weight="bold">⟨ · , · ⟩</text>

    <!-- One dot product -->
    <rect x="503" y="270" width="172" height="44" rx="5" fill="#04130a" stroke="#14532d" stroke-width="1"/>
    <text x="589" y="288" text-anchor="middle" font-size="11" fill="#4ade80" font-weight="bold">⟨ q̄, p̄ ⟩</text>
    <text x="589" y="305" text-anchor="middle" font-size="10" fill="#86efac">= SumSim(Q, P) / (|Q|·|P|)</text>

    <!-- Arrow Stage 3 → 4 -->
    <line x1="690" y1="230" x2="724" y2="230" stroke="#4ade80" stroke-width="2.2" marker-end="url(#arrG)"/>
    <text x="707" y="222" text-anchor="middle" font-size="9" fill="#4ade80">standard</text>
    <text x="707" y="243" text-anchor="middle" font-size="9" fill="#4ade80">MIPS!</text>

    <!-- ═══ STAGE 4: HNSW Index ═══ -->
    <rect x="728" y="68" width="234" height="315" rx="9" fill="url(#stageD)" stroke="#366316" stroke-width="1.5"/>
    <rect x="728" y="68" width="234" height="34" rx="9" fill="#1a2008" opacity="0.95"/>
    <rect x="728" y="88" width="234" height="14" fill="#1a2008" opacity="0.95"/>
    <text x="845" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#bef264" letter-spacing="0.2">Step 4: Standard ANN Index</text>
    <text x="845" y="102" text-anchor="middle" font-size="10" fill="#84cc16" font-style="italic">HNSW / DiskANN / ScaNN</text>

    <!-- HNSW cylinder (3D-ish) -->
    <!-- Cylinder body -->
    <rect x="795" y="148" width="100" height="110" rx="4" fill="#1a2d08" stroke="#4d7c0f" stroke-width="1.5"/>
    <!-- Cylinder top ellipse -->
    <ellipse cx="845" cy="148" rx="50" ry="14" fill="url(#cylEllipse)" stroke="#65a30d" stroke-width="1.5"/>
    <!-- Cylinder bottom ellipse -->
    <ellipse cx="845" cy="258" rx="50" ry="14" fill="#14420a" stroke="#4d7c0f" stroke-width="1.5"/>
    <!-- "layers" inside cylinder -->
    <line x1="796" y1="178" x2="894" y2="178" stroke="#365314" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.7"/>
    <line x1="796" y1="208" x2="894" y2="208" stroke="#365314" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.7"/>
    <line x1="796" y1="238" x2="894" y2="238" stroke="#365314" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.7"/>
    <!-- Mean vectors stored inside -->
    <circle cx="820" cy="165" r="4" fill="#4ade80" opacity="0.8"/>
    <circle cx="845" cy="162" r="4" fill="#38bdf8" opacity="0.8"/>
    <circle cx="868" cy="165" r="4" fill="#4ade80" opacity="0.7"/>
    <circle cx="825" cy="193" r="4" fill="#38bdf8" opacity="0.7"/>
    <circle cx="858" cy="193" r="4" fill="#4ade80" opacity="0.7"/>
    <circle cx="842" cy="190" r="3" fill="#86efac" opacity="0.65"/>
    <circle cx="818" cy="222" r="4" fill="#38bdf8" opacity="0.65"/>
    <circle cx="845" cy="220" r="4" fill="#4ade80" opacity="0.65"/>
    <circle cx="870" cy="222" r="4" fill="#38bdf8" opacity="0.65"/>
    <circle cx="832" cy="248" r="3.5" fill="#4ade80" opacity="0.60"/>
    <circle cx="858" cy="248" r="3.5" fill="#38bdf8" opacity="0.60"/>

    <!-- "mean-pooled p̄ stored" label -->
    <text x="845" y="140" text-anchor="middle" font-size="9.5" fill="#bef264">stores p̄ for each doc</text>

    <!-- Query q̄ entering from left -->
    <circle cx="753" cy="200" r="10" fill="#1a0a28" stroke="#e879f9" stroke-width="2" filter="url(#g1)"/>
    <circle cx="753" cy="200" r="4.5" fill="url(#meanQ)"/>
    <text x="753" y="222" text-anchor="middle" font-size="9.5" fill="#e879f9">q̄</text>
    <!-- Arrow into HNSW -->
    <line x1="763" y1="200" x2="792" y2="200" stroke="#e879f9" stroke-width="1.8" marker-end="url(#arrW)" stroke-dasharray="3 2"/>

    <!-- Result arrow -->
    <line x1="845" y1="272" x2="845" y2="304" stroke="#facc15" stroke-width="2" marker-end="url(#arrY)"/>
    <rect x="775" y="308" width="140" height="40" rx="5" fill="#0f0f04" stroke="#713f12" stroke-width="1"/>
    <text x="845" y="323" text-anchor="middle" font-size="10" fill="#fde68a">Top-k results</text>
    <text x="845" y="337" text-anchor="middle" font-size="9.5" fill="#facc15">ANN nearest neighbours</text>

    <!-- "No PLAID" badge -->
    <rect x="733" y="383" width="224" height="14" rx="4" fill="#040e02" stroke="#365314" stroke-width="1"/>
    <text x="845" y="393" text-anchor="middle" font-size="10" fill="#4ade80" font-weight="bold">No PLAID. No MUVERA. Done. ✓</text>

    <!-- Bottom bar with key insight -->
    <rect x="18" y="398" width="944" height="32" rx="7" fill="#0a0e14" stroke="#1e2a3a" stroke-width="1"/>
    <text x="490" y="411" text-anchor="middle" font-size="10.5" fill="#64748b" font-style="italic">Key insight: bilinearity of inner product means SumSim(Q,P) = |Q|·|P|·⟨q̄, p̄⟩ — the set structure is irrelevant for ranking.</text>
    <text x="490" y="425" text-anchor="middle" font-size="10.5" fill="#86efac">Pre-compute p̄ once per document · index with standard HNSW · query with q̄ · O(log N) lookup</text>
</svg>